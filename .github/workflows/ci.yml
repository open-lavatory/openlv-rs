name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check format
        run: cargo fmt --check

      - name: Build
        run: cargo build --examples

      - name: Test
        run: cargo test
